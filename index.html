<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dribbble Clone</title>

  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  
  <link rel="stylesheet" href="screen.css">
</head>
<body>

  
  <nav class="navbar navbar-expand-lg bg-white shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">Dribbble</a>

      <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="#">Explore</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Hire Designers</a></li>
        </ul>

        <input class="form-control w-25 me-3" type="search" placeholder="Search">
        <button class="btn btn-dark">Sign Up</button>
      </div>
    </div>
  </nav>

  
  <div class="container mt-4">
    <div class="row g-4">

      
      <div class="col-md-4 col-lg-3">
        <div class="card shot-card">
          <img src="https://picsum.photos/400/300?1" class="card-img-top">
          <div class="card-body">
            <h6 class="card-title">Design Shot</h6>
            <div class="d-flex align-items-center">
              <img src="https://i.pravatar.cc/30" class="profile-img me-2">
              <small>User Name</small>
            </div>
          </div>
        </div>
      </div>

      
<div class="col-md-4 col-lg-3">
  <div class="card shot-card">
    <img src="https://picsum.photos/400/300?random=2" class="card-img-top">
    <div class="card-body">
      <h6 class="card-title">Dashboard UI</h6>
      <div class="d-flex align-items-center">
        <img src="https://i.pravatar.cc/30?img=2" class="profile-img me-2">
        <small>Jane Smith</small>
      </div>
    </div>
  </div>
</div>


<div class="col-md-4 col-lg-3">
  <div class="card shot-card">
    <img src="https://picsum.photos/400/300?random=3" class="card-img-top">
    <div class="card-body">
      <h6 class="card-title">Landing Page</h6>
      <div class="d-flex align-items-center">
        <img src="https://i.pravatar.cc/30?img=3" class="profile-img me-2">
        <small>Alex Brown</small>
      </div>
    </div>
  </div>
</div>


<div class="col-md-4 col-lg-3">
  <div class="card shot-card">
    <img src="https://picsum.photos/400/300?random=4" class="card-img-top">
    <div class="card-body">
      <h6 class="card-title">Brand Identity</h6>
      <div class="d-flex align-items-center">
        <img src="https://i.pravatar.cc/30?img=4" class="profile-img me-2">
        <small>Chris Lee</small>
      </div>
    </div>
  </div>
</div>

    </div>
  </div>

</body>
</html>
